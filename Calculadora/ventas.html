<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Proyecto Salcera - Proyección de Ventas</title>
  <link rel="stylesheet" href="css/styles.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <script src="js/main.js"></script>
  <script src="js/ventas.js"></script>
</head>
<body>

  <div class="container">
    <div class="sidebar">
      <h2>Proyecto Salcera</h2>
      <ul class="nav-menu">
        <li class="nav-item"><a href="index.html" class="nav-link"><i>📊</i> Dashboard</a></li>
        <li class="nav-item"><a href="viabilidad.html" class="nav-link"><i>📈</i> Viabilidad</a></li>
        <li class="nav-item"><a href="ventas.html" class="nav-link active"><i>💰</i> Ventas</a></li>
        <li class="nav-item"><a href="compras.html" class="nav-link"><i>🛒</i> Compras</a></li>
        <li class="nav-item"><a href="indicadores.html" class="nav-link"><i>📉</i> Indicadores</a></li>
        <li class="nav-item"><a href="config.html" class="nav-link"><i>⚙️</i> Configuración</a></li>
      </ul>
    </div>
    
    <div class="main-content">
      <h1 class="section-title">Proyección de Ventas</h1>
      
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Configuración de Proyección</h3>
        </div>
        <div class="card-body">
          <div class="form-group">
            <label for="precio-unitario">Precio Unitario Inicial ($)</label>
            <input type="number" id="precio-unitario" value="30.00" step="0.01">
          </div>
          
          <div class="form-group">
            <label for="unidades-iniciales">Unidades Vendidas (Año 1)</label>
            <input type="number" id="unidades-iniciales" value="50000">
          </div>
          
          <div class="form-group">
            <label for="crecimiento-mercado">Crecimiento Anual de Ventas (%)</label>
            <input type="number" id="crecimiento-mercado" value="15.0" step="0.1">
          </div>
          
          <button id="calcular-ventas" class="btn-secondary">Calcular Proyección</button>
        </div>
      </div>
      
      <div class="card">
        <div class="card-header">
          <h3 class="card-title">Resultados de Proyección</h3>
        </div>
        <div class="card-body">
          <div id="resultados-ventas">
            <div class="chart-container">
              <canvas id="ventas-chart"></canvas>
            </div>
            
            <p id="info-inflacion" class="texto-inflacion"></p> <!-- NUEVO -->

            <h4>Detalle de Proyección por Año</h4>
            <table class="table">
              <thead>
                <tr>
                  <th>Año</th>
                  <th>Precio Unitario</th>
                  <th>Unidades</th>
                  <th>Ventas Totales</th>
                </tr>
              </thead>
              <tbody id="proyeccion-ventas-body">
                <!-- Datos generados dinámicamente -->
              </tbody>
            </table>
          </div>
        </div>
      </div>
    </div>
  </div>

</body>
</html>

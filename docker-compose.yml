version: '3.8'

services:
  db:
    image: mysql:8.0
    container_name: mysql_calculadora
    restart: unless-stopped
    
    # 👇 AÑADE ESTA LÍNEA (es la solución)
    command: --default-authentication-plugin=mysql_native_password
    
    environment:
      # 👇 Asegúrate que la contraseña sea la misma que en conexion.php
      MYSQL_ROOT_PASSWORD: 'admin1234' 
      MYSQL_DATABASE: 'analisis_financiero_db'
      
    ports:
      - "3307:3306" 
      
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data:
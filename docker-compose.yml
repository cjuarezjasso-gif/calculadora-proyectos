version: '3.8'

services:
  # -----------------------------------------------
  # SERVICIO NUEVO: Servidor Web (Apache + PHP)
  # -----------------------------------------------
  web:
    # Usamos una imagen oficial que ya trae Apache y PHP
    build:
      context: .
      dockerfile: Dockerfile
    container_name: apache_calculadora
    restart: unless-stopped
    
    # Mapeamos el puerto 8080 de tu PC al puerto 80 del contenedor
    ports:
      - "8080:80" 
      
    # Esta es la parte más importante:
    # Monta tu carpeta actual (./) dentro del servidor Apache
    volumes:
      - ./api:/var/www/html/api
      - ./js:/var/www/html/js
      - ./style:/var/www/html/style
      - ./index.html:/var/www/html/index.html
      
    # Le decimos que este servicio depende de la base de datos
    depends_on:
      - db

  # -----------------------------------------------
  # SERVICIO VIEJO: Base de Datos (MySQL)
  # -----------------------------------------------
  db:
    image: mysql:8.0
    container_name: mysql_calculadora
    restart: unless-stopped
    
    # Este comando lo dejamos para que Workbench funcione
    command: --default-authentication-plugin=mysql_native_password
    
    environment:
      MYSQL_ROOT_PASSWORD: 'admin1234'
      MYSQL_DATABASE: 'analisis_financiero_db'
      
    ports:
      # Dejamos esto para que puedas conectarte con Workbench
      - "3307:3306" 
      
    volumes:
      - mysql-data:/var/lib/mysql

volumes:
  mysql-data: